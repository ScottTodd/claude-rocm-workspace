# ============================================================
# SKETCH: Multi-arch PyTorch release workflow architecture
# This is NOT runnable YAML. It shows the data flow between
# jobs and workflows with minimal detail.
# ============================================================

# ============================================================
# File 1: multi_arch_release_linux_pytorch_wheels.yml
# (orchestrator — owns the matrix, dispatches per-cell)
# ============================================================
# Triggered by: multi_arch_release_linux.yml (via workflow_dispatch)
# Inputs from parent: amdgpu_families, rocm_version,
#   rocm_package_find_links_url, release_type, ref

jobs:
  generate_manifest:
    # Lightweight job: resolve refs, fetch version.txt, compute versions.
    # One manifest per pytorch_git_ref (version.txt differs per ref).
    # No full clones — GitHub API only.
    runs-on: ubuntu-24.04
    outputs:
      manifest_s3_prefix: ${{ steps.generate.outputs.manifest_s3_prefix }}
      build_matrix: ${{ steps.generate.outputs.build_matrix }}
    steps:
      - # Checkout TheRock (for scripts)
      - id: generate
        run: |
          python build_tools/github_actions/generate_pytorch_manifest_upfront.py \
            --rocm-version ${{ inputs.rocm_version }} \
            --upload-to-s3
          # Outputs:
          #   manifest_s3_prefix: s3://bucket/run-id/manifests/
          #   build_matrix: JSON array of {pytorch_git_ref, python_version}
          #     (with exclusions applied, e.g. no py3.14 for torch 2.8)

  build_and_test:
    needs: [generate_manifest]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate_manifest.outputs.build_matrix) }}
      # Each cell is one (pytorch_git_ref, python_version) combination.
      # Example cell: {pytorch_git_ref: "release/2.10", python_version: "3.12"}
    uses: ./.github/workflows/build_and_test_multiarch_pytorch.yml
    with:
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      python_version: ${{ matrix.python_version }}
      manifest_s3_prefix: ${{ needs.generate_manifest.outputs.manifest_s3_prefix }}
      amdgpu_families: ${{ inputs.amdgpu_families }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      release_type: ${{ inputs.release_type }}
      ref: ${{ inputs.ref }}


# ============================================================
# File 2: build_and_test_multiarch_pytorch.yml
# (reusable workflow — one per (pytorch_git_ref, python_version))
# ============================================================
# Called by: multi_arch_release_linux_pytorch_wheels.yml matrix
# Contains: build job + test job(s) with inner family matrix

on:
  workflow_call:
    inputs:
      pytorch_git_ref: {type: string}
      python_version: {type: string}
      manifest_s3_prefix: {type: string}
      amdgpu_families: {type: string}
      rocm_version: {type: string}
      rocm_package_find_links_url: {type: string}
      release_type: {type: string}
      ref: {type: string}

jobs:
  build:
    runs-on: azure-linux-scale-rocm  # or equivalent
    outputs:
      torch_version: ${{ steps.versions.outputs.torch_version }}
      package_index_url: ${{ steps.upload.outputs.package_index_url }}
    steps:
      - # Checkout TheRock
      - # Download manifest from S3
      - # Checkout pytorch repos at manifest commit SHAs
        #   (new script: checkout_from_manifest.py)
      - # Build wheels (all GPU targets)
      - # kpack-split
      - id: versions
        # Extract torch_version from built wheel (write_torch_versions.py)
        # OR read from manifest (version.txt + suffix, already computed)
      - id: upload
        # Upload wheels to S3 v4/whl
        # Output: package_index_url (CDN URL for the index)

  generate_test_matrix:
    runs-on: ubuntu-24.04
    outputs:
      test_matrix: ${{ steps.configure.outputs.test_matrix }}
    steps:
      - # Checkout TheRock (for scripts)
      - id: configure
        run: |
          python build_tools/github_actions/configure_pytorch_test_matrix.py \
            --amdgpu-families "${{ inputs.amdgpu_families }}" \
            --platform linux
          # Outputs test_matrix: JSON array of
          #   {amdgpu_family, test_runs_on, test_level}
          # Examples:
          #   {amdgpu_family: "gfx94X-dcgpu", test_runs_on: "linux-gfx942-1gpu-ossci-rocm", test_level: "full"}
          #   {amdgpu_family: "gfx110X-all", test_runs_on: "linux-gfx110X-gpu-rocm", test_level: "smoke"}
          #   {amdgpu_family: "gfx1151", test_runs_on: "", test_level: "none"}  # filtered out by script

  test:
    needs: [build, generate_test_matrix]
    if: ${{ needs.generate_test_matrix.outputs.test_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        family_info: ${{ fromJSON(needs.generate_test_matrix.outputs.test_matrix) }}
    uses: ./.github/workflows/test_pytorch_wheels.yml
    with:
      amdgpu_family: ${{ matrix.family_info.amdgpu_family }}
      test_runs_on: ${{ matrix.family_info.test_runs_on }}
      package_index_url: ${{ needs.build.outputs.package_index_url }}
      torch_version: ${{ needs.build.outputs.torch_version }}
      pytorch_git_ref: ${{ inputs.pytorch_git_ref }}
      python_version: ${{ inputs.python_version }}
      multi_arch: true


# ============================================================
# Data flow summary
# ============================================================
#
# multi_arch_release_linux.yml (parent)
#   │
#   │ dispatch (amdgpu_families, rocm_version, find_links_url, release_type)
#   ▼
# multi_arch_release_linux_pytorch_wheels.yml (orchestrator)
#   │
#   ├─► generate_manifest
#   │     reads: pytorch_git_refs (hardcoded list), rocm_version
#   │     resolves: refs → commits (GitHub API)
#   │     fetches: version.txt per repo per ref (GitHub API)
#   │     writes: manifest JSONs to S3
#   │     outputs: manifest_s3_prefix, build_matrix
#   │
#   └─► build_and_test (matrix: pytorch_git_ref × python_version)
#         │
#         │ workflow_call (per cell)
#         ▼
#       build_and_test_multiarch_pytorch.yml
#         │
#         ├─► build
#         │     reads: manifest from S3 (commit SHAs, versions)
#         │     builds: wheels for all GPU targets
#         │     uploads: wheels to S3 v4/whl
#         │     outputs: torch_version, package_index_url
#         │
#         ├─► generate_test_matrix
#         │     reads: amdgpu_families, amdgpu_family_matrix.py
#         │     applies: test policy (which families, test depth)
#         │     outputs: test_matrix [{amdgpu_family, test_runs_on, test_level}]
#         │
#         └─► test (matrix: family_info from test_matrix, needs: build)
#               calls: test_pytorch_wheels.yml
#               inputs: family, runner, torch_version, index_url, multi_arch=true
